name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage with Claude
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '';
            const labels = issue.labels.map(l => l.name);

            // Extract component from template dropdown (if user selected one)
            const componentMatch = body.match(/### Component\s*\n\s*(.+)/);
            const areaMatch = body.match(/### Area\s*\n\s*(.+)/);
            const issueTypeMatch = body.match(/### Issue type\s*\n\s*(.+)/);
            const selectedComponent = componentMatch ? componentMatch[1].trim() : (areaMatch ? areaMatch[1].trim() : null);

            // Map dropdown values to label names
            const componentMap = {
              'CLI — Tasks': 'tasks',
              'CLI — Calendar': 'calendar',
              'CLI — Email': 'email',
              'CLI — Contacts': 'contacts',
              'CLI — Teams': 'teams',
              'MCP Server': 'mcp',
              'Auth / Setup': 'auth',
              'Config / Profiles': 'auth',
              'Tasks (To Do)': 'tasks',
              'Calendar': 'calendar',
              'Email': 'email',
              'Contacts': 'contacts',
              'Teams': 'teams',
              'MCP Server / Claude Desktop': 'mcp',
              'Auth / Multi-account': 'auth',
              'Output / Formatting': 'enhancement',
              'New Integration': 'enhancement',
              'Workspace': 'workspace'
            };

            const prompt = [
              'You are a triage assistant for Outpost, a CLI tool for Microsoft Outlook and Teams via the Microsoft Graph API.',
              '',
              'Analyze this GitHub issue and return a JSON object with your classification.',
              '',
              '## Issue Title',
              title,
              '',
              '## Issue Body',
              body,
              '',
              '## Template Labels Already Applied',
              labels.join(', ') || 'none',
              '',
              '## User-Selected Component (from dropdown)',
              selectedComponent || 'not selected',
              '',
              '## Available Components',
              '- tasks: Microsoft To Do — task add/list/update/complete/delete, task list management',
              '- calendar: Outlook Calendar — events, today, next, week view, attendees',
              '- email: Outlook Email — list/read/send/reply/delete, search, attachments',
              '- contacts: Outlook Contacts — list, search (read-only)',
              '- teams: Microsoft Teams — channels, messages, SharePoint files, upload/download',
              '- mcp: MCP server for Claude Desktop — 35 tools, stdio/SSE transport, workspace',
              '- workspace: MCP transient workspace — file download/read/write/upload round-trip',
              '- auth: Authentication — device code flow, MSAL token cache, scopes, multi-account profiles',
              '- graph-api: Microsoft Graph API — HTTP client, retry/backoff, pagination, error handling',
              '',
              '## Available Priorities',
              '- critical: Completely broken, data loss, security vulnerability',
              '- high: Major feature broken, blocking normal usage',
              '- medium: Important but has workaround',
              '- low: Minor inconvenience, cosmetic, nice-to-have',
              '',
              '## Instructions',
              '1. If the user selected a component, use it. Otherwise infer from the content.',
              '2. Determine priority based on severity and impact.',
              '3. Write a brief triage summary (2-3 sentences max).',
              '',
              'Return ONLY valid JSON, no markdown fences:',
              '{"component":"tasks|calendar|email|contacts|teams|mcp|workspace|auth|graph-api","priority":"critical|high|medium|low","summary":"Brief triage summary","needsMoreInfo":true/false}'
            ].join('\n');

            // Call Claude API
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 512,
                messages: [{ role: 'user', content: prompt }]
              })
            });

            if (!response.ok) {
              const err = await response.text();
              core.setFailed('Claude API error: ' + response.status + ' ' + err);
              return;
            }

            const result = await response.json();
            const text = result.content[0].text;

            let classification;
            try {
              classification = JSON.parse(text);
            } catch (e) {
              const jsonMatch = text.match(/\{[\s\S]*\}/);
              if (jsonMatch) {
                classification = JSON.parse(jsonMatch[0]);
              } else {
                core.setFailed('Failed to parse Claude response: ' + text);
                return;
              }
            }

            // If user selected a component in the dropdown, prefer that
            if (selectedComponent && componentMap[selectedComponent]) {
              classification.component = componentMap[selectedComponent];
            }

            console.log('Classification:', JSON.stringify(classification, null, 2));

            // Apply labels
            const labelsToAdd = [classification.component];

            if (classification.priority === 'critical' || classification.priority === 'high') {
              labelsToAdd.push('priority: ' + classification.priority);
            }

            if (classification.needsMoreInfo) {
              labelsToAdd.push('needs-info');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

            // Post triage comment
            const priorityEmoji = { critical: '\ud83d\udd34', high: '\ud83d\udfe0', medium: '\ud83d\udfe1', low: '\ud83d\udfe2' };

            let comment = '### Triage Summary\n\n';
            comment += '**Priority:** ' + (priorityEmoji[classification.priority] || '') + ' ' + classification.priority + '\n';
            comment += '**Component:** ' + classification.component + '\n\n';
            comment += classification.summary + '\n\n';

            if (classification.needsMoreInfo) {
              comment += '> We need a bit more information to investigate this. Please check the labels and provide any additional details.\n\n';
            }

            comment += '---\n*Classified automatically by AI triage*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });
