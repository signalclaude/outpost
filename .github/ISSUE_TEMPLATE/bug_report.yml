name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of outpost is affected?
      options:
        - CLI — Tasks
        - CLI — Calendar
        - CLI — Email
        - CLI — Contacts
        - CLI — Teams
        - MCP Server
        - Auth / Setup
        - Config / Profiles
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `outpost cal today`, I get..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands to reproduce the issue.
      placeholder: |
        1. Run `outpost setup`
        2. Run `outpost cal today`
        3. See error...
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste the full error message or traceback.
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.0"

  - type: dropdown
    id: account-type
    attributes:
      label: Microsoft account type
      options:
        - Personal (outlook.com / hotmail)
        - Work / School (Microsoft 365)
        - Not sure
